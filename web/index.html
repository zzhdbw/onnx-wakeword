<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>轻量离线唤醒词演示 — 曼波 · 你好电脑 · 开始播放 · 来福</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a; color: #e0e0e0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 16px;
  }
  .card {
    background: #1a1a2e; border-radius: 16px; padding: 24px;
    max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 { font-size: 20px; text-align: center; margin-bottom: 4px; }
  .sub { text-align: center; color: #888; font-size: 12px; margin-bottom: 20px; }
  .status-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    padding: 12px; border-radius: 10px; background: #16213e;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .dot.listening { background: #16c79a; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .status-text { flex: 1; font-size: 14px; }
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: .2s;
  }
  .btn-start { background: #16c79a; color: #000; }
  .btn-start:hover { background: #13b38a; }
  .btn-stop { background: #e94560; color: #fff; }
  .btn-stop:hover { background: #d13650; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .detect-box {
    margin-top: 16px; padding: 16px; border-radius: 10px;
    background: #0f3460; text-align: center; min-height: 64px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px;
  }
  .detect-word { font-size: 28px; font-weight: 700; color: #e94560; }
  .detect-prob { font-size: 18px; color: #ffd93d; }
  .detect-idle { color: #666; font-size: 14px; }
  .log-box { margin-top: 12px; max-height: 180px; overflow-y: auto; font-size: 12px; }
  .log-entry {
    display: flex; justify-content: space-between; padding: 6px 8px;
    border-bottom: 1px solid #222;
  }
  .log-word { color: #e94560; font-weight: 600; }
  .log-time { color: #888; }
  .log-prob { color: #ffd93d; }
  .model-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
  .tag {
    padding: 4px 10px; border-radius: 6px; font-size: 11px;
    background: #2a2a4a; color: #aaa;
  }
  .tag.active { background: #16c79a33; color: #16c79a; border: 1px solid #16c79a; }
</style>
</head>
<body>
<div class="card">
  <h1>轻量离线唤醒词</h1>
  <div class="sub">ONNX · <1MB · 浏览器本地推理 · 不上传音频</div>

  <div class="model-tags" id="modelTags">
    <span class="tag active" data-word="曼波">曼波</span>
    <span class="tag active" data-word="你好电脑">你好电脑</span>
    <span class="tag active" data-word="开始播放">开始播放</span>
    <span class="tag active" data-word="来福">来福</span>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">请通过 HTTP 服务打开此页面（不要双击打开）</span>
  </div>

  <button class="btn btn-start" id="btnToggle" disabled>加载模型中...</button>

  <div class="detect-box">
    <span class="detect-idle" id="detectDisplay">等待唤醒</span>
  </div>

  <div class="log-box" id="logBox"></div>
</div>

<script src="wakeword.js"></script>
<script>
// ---- State ----
let detector = null;
let gate = null;
let running = false;
let logCount = 0;
const COOLDOWN_MS = 3500;
let lastTrigger = {};
const MODEL_NAMES = ['曼波', '你好电脑', '开始播放', '来福'];

// ---- UI refs ----
const btnToggle = document.getElementById('btnToggle');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const detectDisplay = document.getElementById('detectDisplay');
const logBox = document.getElementById('logBox');

// ---- Init ----
(async () => {
  try {
    detector = createDetector();
    await detector.loadModels(
      '../models/model_info.json',
      '../models/melspectrogram.onnx',
      '../models/embedding_model.onnx'
    );
    gate = createConfidenceGate({ relativeRatio: 3.0, absoluteThreshold: 0.5, cooldownMs: 3500 });
    btnToggle.disabled = false;
    btnToggle.textContent = '开始监听';
    btnToggle.className = 'btn btn-start';
    statusText.textContent = '已加载 4 个唤醒词，点击开始';
  } catch (e) {
    btnToggle.textContent = '加载失败';
    statusText.textContent = '错误: ' + e.message;
    console.error(e);
  }
})();

btnToggle.addEventListener('click', async () => {
  if (running) {
    stop();
    return;
  }
  await start();
});

function addLog(word, prob) {
  logCount++;
  const now = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-word">#${logCount} ${word}</span><span class="log-prob">${(prob*100).toFixed(0)}%</span><span class="log-time">${now}</span>`;
  logBox.insertBefore(div, logBox.firstChild);
  if (logBox.children.length > 30) logBox.removeChild(logBox.lastChild);
}

async function start() {
  running = true;
  btnToggle.textContent = '停止';
  btnToggle.className = 'btn btn-stop';
  statusDot.classList.add('listening');
  statusText.textContent = '正在监听...';

  // Reset per-word cooldown
  lastTrigger = {};
  gate.reset();

  let peakScore = 0;
  let peakWord = '';
  let peakTimer = null;

  try {
    await detector.startMic((score, allProbs) => {
      // Find best word
      let bestScore = 0, bestName = '';
      if (allProbs) {
        for (const name of MODEL_NAMES) {
          if (allProbs[name] && allProbs[name] > bestScore) {
            bestScore = allProbs[name];
            bestName = name;
          }
        }
      } else {
        bestScore = score;
      }

      // Peak tracking over ~1.5s window
      if (bestScore > peakScore) {
        peakScore = bestScore;
        peakWord = bestName;
        clearTimeout(peakTimer);
        peakTimer = setTimeout(() => {
          const triggered = gate.onScore(peakScore);
          if (triggered && peakWord) {
            const now = Date.now();
            if (!lastTrigger[peakWord] || (now - lastTrigger[peakWord]) > COOLDOWN_MS) {
              lastTrigger[peakWord] = now;
              detectDisplay.innerHTML = `<span class="detect-word">${peakWord}</span><span class="detect-prob">${(peakScore*100).toFixed(0)}%</span>`;
              addLog(peakWord, peakScore);
              setTimeout(() => {
                detectDisplay.innerHTML = '<span class="detect-idle">等待唤醒</span>';
              }, 2000);
            }
          }
          peakScore = 0;
          peakWord = '';
        }, 1500);
      }
    });
  } catch (e) {
    statusText.textContent = '麦克风错误: ' + e.message;
    stop();
  }
}

function stop() {
  running = false;
  if (detector) detector.stopMic();
  btnToggle.textContent = '开始监听';
  btnToggle.className = 'btn btn-start';
  statusDot.classList.remove('listening');
  statusText.textContent = '已停止';
  detectDisplay.innerHTML = '<span class="detect-idle">等待唤醒</span>';
}
</script>
</body>
</html>
